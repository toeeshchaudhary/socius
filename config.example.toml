# Socius configuration example.
# Copy to ~/.config/socius/config.toml and edit. Every value has a built-in
# default (see packages/config/src/index.ts), so you only need to set overrides.
# TOML config loading from disk lands in a later milestone; this documents the
# shape and shows how MCP servers are declared.

[model]
id = "gemma-4-e4b-it-q4_k_m"
path = "~/AI/models/gemma-4-E4B-it-Q4_K_M.gguf"
contextWindow = 4096
# This 5GB model exceeds 4GB VRAM; partial offload of its E-series arch crashes
# llama.cpp, so CPU-only is the reliable setting. A smaller model/quant that fits
# 4GB can raise this.
gpuLayers = 0

[inference]
# Which backend serves chat: "local" runs llama-server with the [model] above;
# "remote" talks to an OpenAI-compatible gateway ([inference.remote] below).
backend = "local"
# Reasoning models otherwise spend the whole budget "thinking" and return empty
# content. Leave false for fast, direct answers.
thinking = false

# --- Remote inference ----------------------------------------------------------
# Any OpenAI-compatible gateway works. Built-in gateway presets (just name one):
#   vercel     — Vercel AI Gateway (https://vercel.com/ai-gateway); one key, many models
#   openrouter — models ending in ":free" cost nothing (rate-limited)
#   groq       — generous free tier, very fast open models
#   google     — Google AI Studio, free tier for Gemini models
#   cerebras   — free tier, fast open models
# Or gateway = "custom" with an explicit baseUrl. Keys resolve in order:
# apiKey below (supports ${VAR}) → `socius key set <gateway> <key>` → the
# gateway's env var (OPENROUTER_API_KEY, GROQ_API_KEY, …), so apiKey is optional.
# Switch backends by flipping `backend` above and restarting (socius restart),
# or just run `socius model use <gateway> <model>`.
#
# [inference.remote]
# gateway = "openrouter"
# model = "meta-llama/llama-3.3-70b-instruct:free"
# apiKey = "${OPENROUTER_API_KEY}"
# contextWindow = 32768
#
# [inference.remote]                      # Vercel AI Gateway example
# gateway = "vercel"
# model = "anthropic/claude-haiku-4.5"
# apiKey = "${AI_GATEWAY_API_KEY}"
#
# [inference.remote]                      # any other OpenAI-compatible endpoint
# gateway = "custom"
# baseUrl = "https://my-gateway.example.com/v1"
# model = "some-model"
# apiKey = "${MY_KEY}"

[permissions]
defaultMode = "live"          # dry_run | sandbox | live

[permissions.policy]
"fs.read"  = "allow"
"fs.write" = "confirm"        # destructive tools always prompt
"fs.delete"= "confirm"
net        = "confirm"
exec       = "confirm"
secrets    = "deny"

# --- MCP servers -------------------------------------------------------------
# Each enabled server is spawned; its tools appear alongside native tools,
# namespaced "server/tool" (e.g. "filesystem/read_file"). A server that fails to
# start is skipped — native tools keep working.

[[mcp]]
name = "filesystem"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/home/toeesh/Documents"]
enabled = false

[[mcp]]
name = "demo"
command = "bun"
args = ["run", "scripts/mcp-server.ts"]   # the local test server in this repo
enabled = false

# --- Scheduled background tasks (M6) -----------------------------------------
# Each enabled schedule runs its prompt on a timer and (by default) sends a
# desktop notification with the result (notify-send / dunst). Provide either
# `everyMinutes` or `dailyAt = "HH:MM"`. Run one now with `socius schedule run <name>`.

[[schedules]]
name = "morning"
prompt = "Summarize today's important emails and calendar events, plus any uncommitted git changes. Short bullets."
dailyAt = "08:00"
enabled = false
notify = true

[[schedules]]
name = "standup"
prompt = "Summarize what changed in this repo in the last day (git log)."
everyMinutes = 240
enabled = false
